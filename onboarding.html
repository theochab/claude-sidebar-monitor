<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claude Sidebar Monitor</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1>Claude Sidebar Monitor</h1>
    <p class="subtitle" id="subtitle"></p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text" id="step1"></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text" id="step2"></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text" id="step3"></div>
      </div>
    </div>

    <a class="cta" id="cta" href="https://claude.ai"></a>

    <p class="footer" id="footer"></p>
  </div>

  <script src="onboarding.js"></script>
</body>
</html>
